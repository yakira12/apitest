<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Menu Item Welcome Page</title>
</head>
<body>
    <div>
        <h1>Restaurant Menu</h1>
    </div>
    <div>
          {% for item in menu_items %}
            <li>
                item name: {{item.name}} <br>
                item description : {{item.description}}<br>
                item price: {{item.price}}<br>
            </li>
            <h3><a href="{{ url_for('edit_item', id = item.id ) }}">edit</a></h3>
            <h3><a href="#">delete</a></h3>
        {% endfor %}




    </div>

</body>
</html>
